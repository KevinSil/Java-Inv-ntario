<!DOCTYPE html>
<!-- Indica ao browser que este documento usa HTML5 -->

<html xmlns:th="http://www.thymeleaf.org">
<!-- Elemento raiz da página.
     O atributo xmlns:th declara o namespace do Thymeleaf,
     para poderes usar atributos como th:text e th:each -->

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/styles.css}">


    <title th:text="${titulo}">Index</title>
    <!-- Se existir a variável "titulo" enviada pelo controller,
         Se não existir, aparece "Index". -->

    
</head>

<body>

    <h1 th:text="${titulo}"></h1>
    <!-- Mostra o valor da variável "titulo" enviada pelo controller.
         model.addAttribute("titulo", "Página Principal nº2"); -->





    <h2>Lista de produtos</h2>
    <table>
        <!-- Tabela onde vão ser mostrados os produtos -->
        <thead>
            <!-- Cabeçalho da tabela -->
            <tr>
                <th>Id</th>
                <th>Nome</th>
                <th>Preço</th>
                <th>Fornecedor</th>
                <th>Quantidade Stock</th>
                <th>Categoria</th>
            </tr>
        </thead>

       
        <tbody>
            <!-- Corpo da tabela -->
            <tr th:each="produto : ${produtos}">

                <td th:text="${produto.id}"></td>

                <td th:text="${produto.nome}"></td>
                <td th:text="${produto.preco}"></td>
                <td th:text="${produto.fornecedor}"></td>
                <td th:text="${produto.quantidadeStock}"></td>
                <td th:text="${produto.categoria}"></td>
                <th>Em Promoção</th>
                <td th:text="${produto.emPromocao} ? (${produto.percentagemPromocao} + '%') : 'Não'"></td>

            </tr>
        </tbody>
    </table>




</body>
</html>
